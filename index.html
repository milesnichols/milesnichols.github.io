<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin" />
    <title>Hook Point Solutions | Software Consulting</title>
    
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    colors: {
                        brand: {
                            navy: '#0A192F', teal: '#14b8a6', cyan: '#06b6d4', darkbg: '#0f172a', darkcard: '#1e293b'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { cursor: none; }
        .custom-cursor {
            position: fixed; top: 0; left: 0; width: 20px; height: 20px; border: 2px solid #14b8a6; border-radius: 50%;
            pointer-events: none; transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s, background-color 0.2s, border-color 0.2s;
            z-index: 99999; backdrop-filter: grayscale(1);
        }
        .custom-cursor.hovering { width: 50px; height: 50px; background-color: rgba(20, 184, 166, 0.2); border-color: transparent; }
        
        /* Blinking cursor for the typing effect */
        .typing-cursor::after {
            content: '|';
            animation: blink 1s step-start infinite;
            color: #14b8a6;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-brand-darkbg dark:text-slate-200 font-sans antialiased transition-colors duration-300">

    <div class="custom-cursor"></div>

    <nav class="bg-white/80 dark:bg-brand-darkbg/80 backdrop-blur-md shadow-sm fixed w-full z-50 top-0 transition-colors duration-300">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="font-bold text-xl text-brand-navy dark:text-white flex items-center gap-2">
                <a href="index.html" class="flex items-center gap-2">
                    <img src="logo.png" alt="Hook Point Solutions Logo" class="h-10 w-auto rounded-md">
                </a>
            </div>
            <div class="hidden md:flex items-center space-x-6 text-sm font-medium text-slate-600 dark:text-slate-300">
                <a href="about.html" class="hover:text-brand-teal transition cursor-none">About</a>
                <a href="portfolio.html" class="hover:text-brand-teal transition cursor-none">Portfolio</a>
                <a href="index.html#contact" class="hover:text-brand-teal transition cursor-none">Contact</a>
                <button id="theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 cursor-none">🌓</button>
            </div>
        </div>
    </nav>

    <section id="home" class="pt-40 pb-20 px-4 text-center bg-brand-navy dark:bg-slate-900 text-white min-h-[80vh] flex items-center justify-center">
        <div class="max-w-3xl mx-auto flex flex-col items-center" data-aos="fade-up">
            <h1 class="text-5xl md:text-6xl font-extrabold mb-6 tracking-tight">
                Precise Technical <br>
                <span id="typed-text" class="text-brand-teal typing-cursor"></span>
            </h1>
            <p class="text-xl text-slate-300 mb-10 leading-relaxed" data-aos="fade-up" data-aos-delay="200">Expert software consulting turning ideas into robust architecture.</p>
            <a href="index.html#contact" data-aos="zoom-in" data-aos-delay="400" class="inline-block bg-brand-teal hover:bg-brand-cyan text-white font-bold py-3 px-8 rounded-full shadow-lg cursor-none transition-all hover:scale-105">
                Let's Build Together
            </a>
        </div>
    </section>

    <section id="contact" class="py-24 px-4 max-w-2xl mx-auto text-center relative">
        <h2 class="text-3xl font-bold text-brand-navy dark:text-white mb-6" data-aos="fade-up">Get In Touch</h2>
        <p class="text-slate-600 dark:text-slate-400 mb-10" data-aos="fade-up">Ready to discuss your next technical project?</p>
        
        <div class="absolute top-1/2 left-0 w-72 h-72 bg-brand-teal/20 rounded-full blur-3xl opacity-50 pointer-events-none"></div>
        <div class="absolute bottom-0 right-0 w-72 h-72 bg-brand-cyan/20 rounded-full blur-3xl opacity-50 pointer-events-none"></div>

        <div class="relative bg-white/60 dark:bg-slate-800/60 backdrop-blur-xl p-8 rounded-2xl shadow-xl border border-white/40 dark:border-white/10" data-aos="zoom-in">
            <form id="contact-form" action="https://formspree.io/f/xreaneng" method="POST" class="space-y-6 text-left">
                <div>
                    <input type="text" name="name" placeholder="Your Name" required class="w-full px-5 py-4 rounded-lg bg-white/50 dark:bg-slate-900/50 dark:text-white focus:ring-2 focus:ring-brand-teal outline-none cursor-none">
                </div>
                <div>
                    <input type="email" name="email" placeholder="you@example.com" required class="w-full px-5 py-4 rounded-lg bg-white/50 dark:bg-slate-900/50 dark:text-white focus:ring-2 focus:ring-brand-teal outline-none cursor-none">
                </div>
                <div>
                    <textarea name="message" rows="5" placeholder="Project Details" required class="w-full px-5 py-4 rounded-lg bg-white/50 dark:bg-slate-900/50 dark:text-white focus:ring-2 focus:ring-brand-teal outline-none cursor-none"></textarea>
                </div>
                <button type="submit" class="w-full bg-brand-navy dark:bg-brand-teal text-white font-bold py-4 px-8 rounded-lg cursor-none">Send Message</button>
            </form>
        </div>
    </section>

    <footer class="bg-slate-900 text-slate-400 py-10 text-center text-sm border-t border-slate-800">
        <p>&copy; 2026 Hook Point Solutions. All rights reserved.</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true, duration: 800 });

        // --- Typing Effect Logic ---
        const words = ["Solutions.", "Architecture.", "Automation.", "Systems."];
        let i = 0, timer;
        const typedText = document.getElementById('typed-text');

        function typingEffect() {
            let word = words[i].split('');
            let loopTyping = function() {
                if (word.length > 0) {
                    typedText.innerHTML += word.shift();
                } else {
                    setTimeout(deletingEffect, 2000); // Wait 2 seconds before deleting
                    return false;
                }
                timer = setTimeout(loopTyping, 100); // Speed of typing
            };
            loopTyping();
        }

        function deletingEffect() {
            let word = words[i].split('');
            let loopDeleting = function() {
                if (word.length > 0) {
                    word.pop();
                    typedText.innerHTML = word.join('');
                } else {
                    i = (i === words.length - 1) ? 0 : i + 1; // Cycle through words
                    setTimeout(typingEffect, 500); // Wait before typing next word
                    return false;
                }
                timer = setTimeout(loopDeleting, 50); // Speed of deleting
            };
            loopDeleting();
        }
        typingEffect(); // Start the loop
        // -----------------------------

        // Custom Cursor Logic
        const cursor = document.querySelector('.custom-cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        document.querySelectorAll('a, button, input, textarea').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
        });

        // Theme Toggle
        const themeBtn = document.getElementById('theme-toggle');
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        themeBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('color-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });
    </script>
</body>
</html>
